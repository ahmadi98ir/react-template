name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ahmadi98.ir' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to GHCR (backup)
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Transfer image to server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          SSH_USER="${{ secrets.SSH_USER || 'root' }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          echo "==> Streaming Docker image to server (this may take a few minutes)..."
          docker save "$IMAGE_TAG" | gzip | \
            sshpass -e ssh -p "$SSH_PORT" $OPTS "${SSH_USER}@${SSH_HOST}" \
              'gzip -d | docker load'
          echo "==> Image loaded on server."

      - name: Trigger Coolify deploy from server localhost
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          SSH_USER="${{ secrets.SSH_USER || 'root' }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          TOKEN="${{ secrets.COOLIFY_TOKEN }}"
          UUID="${{ secrets.COOLIFY_APP_UUID }}"

          sshpass -e ssh -p "$SSH_PORT" $OPTS "${SSH_USER}@${SSH_HOST}" \
            "for port in 8000 80; do
               resp=\$(curl -sf -X GET \"http://localhost:\${port}/api/v1/deploy?uuid=${UUID}\" \
                 -H \"Authorization: Bearer ${TOKEN}\" 2>&1) && echo \"Deploy triggered on port \${port}: \${resp}\" && exit 0
             done
             echo 'WARNING: Coolify API unreachable from localhost — redeploy manually in dashboard'"
