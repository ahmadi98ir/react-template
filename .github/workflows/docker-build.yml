name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ahmadi98.ir' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to GHCR (backup)
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Transfer image to server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          SSH_USER="${{ secrets.SSH_USER || 'root' }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          echo "==> Streaming Docker image to server..."
          docker save "$IMAGE_TAG" | gzip | \
            sshpass -e ssh -p "$SSH_PORT" $OPTS "${SSH_USER}@${SSH_HOST}" \
              'gzip -d | docker load'
          echo "==> Image loaded on server."

      - name: Trigger Coolify deploy from server localhost
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          SSH_USER="${{ secrets.SSH_USER || 'root' }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          WEBHOOK="${{ secrets.COOLIFY_WEBHOOK }}"

          # Extract the path+query from the webhook URL (e.g. /api/v1/deploy?uuid=xxx)
          # Then call it via localhost to bypass the external Host restriction
          sshpass -e ssh -p "$SSH_PORT" $OPTS "${SSH_USER}@${SSH_HOST}" \
            "WEBHOOK_PATH=\$(echo '${WEBHOOK}' | grep -oP '/api/v1/[^\"]+')
             for port in 8000 80; do
               resp=\$(curl -sf \"http://localhost:\${port}\${WEBHOOK_PATH}\" \
                 -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' 2>&1) \
               && echo \"Deploy triggered on port \${port}: \${resp}\" && exit 0
             done
             # If localhost API fails, try the full webhook URL directly from server
             curl -sf '${WEBHOOK}' \
               -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
             && echo 'Deploy triggered via direct webhook' \
             || echo 'WARNING: deploy trigger failed — redeploy manually in Coolify dashboard'"
