name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ahmadi98.ir' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        continue-on-error: true
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          TRIGGERED=false

          # Option 1: public webhook URL (skip localhost — those only work from the server itself)
          if [ -n "$COOLIFY_WEBHOOK" ] && ! echo "$COOLIFY_WEBHOOK" | grep -qE "localhost|127\.0\.0\.1"; then
            echo "Triggering Coolify deploy via public webhook URL..."
            curl -fsSL --max-time 15 "$COOLIFY_WEBHOOK" \
              && { echo "Deploy triggered OK"; TRIGGERED=true; } \
              || echo "Webhook call failed"
          fi

          # Option 2: bearer token → discover UUID via public API then deploy
          if [ "$TRIGGERED" = "false" ] && [ -n "$COOLIFY_TOKEN" ]; then
            echo "Discovering Coolify app UUID via bearer token..."
            for host in "https://cool.rpim.ir" "http://cool.rpim.ir:8000"; do
              RESP=$(curl -fsSL --max-time 15 "$host/api/v1/applications" \
                -H "Authorization: Bearer $COOLIFY_TOKEN" 2>/dev/null) || continue
              UUID=$(echo "$RESP" | jq -r \
                '(if type=="array" then . else (.data // []) end)[]
                 | select((.image // "") | contains("react-template")) | .uuid' \
                2>/dev/null | head -1)
              if [ -n "$UUID" ]; then
                echo "Found UUID=$UUID on $host, triggering deploy..."
                curl -fsSL --max-time 15 "$host/api/v1/deploy?uuid=$UUID&force=true" \
                  -H "Authorization: Bearer $COOLIFY_TOKEN" \
                  && { echo "Deploy triggered"; TRIGGERED=true; break; } \
                  || echo "Deploy call failed on $host"
              fi
            done
          fi

          if [ "$TRIGGERED" = "false" ]; then
            echo "Auto-deploy skipped — COOLIFY_WEBHOOK is localhost-only and COOLIFY_TOKEN could not reach cool.rpim.ir"
            echo "Manual action: log in to https://cool.rpim.ir and click Redeploy on the react-template app"
          fi
