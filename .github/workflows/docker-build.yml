name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for SSH transfer)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ahmadi98.ir' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to GHCR (backup/cache)
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer image to server and trigger Coolify deploy
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          SSH_USER="${{ secrets.SSH_USER || 'root' }}"
          SSH_HOST="${{ secrets.SSH_HOST }}"

          echo "==> Streaming Docker image to server..."
          docker save "${{ env.IMAGE_TAG }}" | gzip | \
            ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no \
              "${SSH_USER}@${SSH_HOST}" \
              'gzip -d | docker load'

          echo "==> Triggering Coolify deploy via localhost API..."
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" \
            'curl -sf -X GET \
               "http://localhost:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
             && echo "Deploy triggered successfully" \
             || curl -sf -X GET \
               "http://localhost:80/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
             && echo "Deploy triggered via port 80" \
             || echo "WARNING: Coolify API not reached from localhost — manual deploy may be needed"'
