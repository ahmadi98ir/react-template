name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ahmadi98.ir' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        continue-on-error: true
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK" ]; then
            echo "Triggering Coolify deploy via webhook URL..."
            curl -fsSL --max-time 15 "$COOLIFY_WEBHOOK" && echo "Deploy triggered OK" || echo "Webhook call failed (non-fatal)"
            exit 0
          fi
          if [ -n "$COOLIFY_TOKEN" ]; then
            echo "Discovering Coolify app UUID..."
            for host in "https://cool.rpim.ir" "http://cool.rpim.ir:8000"; do
              RESP=$(curl -fsSL --max-time 15 "$host/api/v1/applications" \
                -H "Authorization: Bearer $COOLIFY_TOKEN" 2>/dev/null) || continue
              UUID=$(echo "$RESP" | jq -r '(if type=="array" then . else .data // [] end)[]
                | select((.image // "") | contains("react-template")) | .uuid' 2>/dev/null | head -1)
              if [ -n "$UUID" ]; then
                echo "Found UUID=$UUID on $host, triggering deploy..."
                curl -fsSL --max-time 15 "$host/api/v1/deploy?uuid=$UUID&force=true" \
                  -H "Authorization: Bearer $COOLIFY_TOKEN" && echo "Deploy triggered" && exit 0
              fi
            done
            echo "Could not find react-template app via Coolify API (non-fatal)"
            exit 0
          fi
          echo "No COOLIFY_WEBHOOK or COOLIFY_TOKEN set — add one to repository secrets to enable auto-deploy"
