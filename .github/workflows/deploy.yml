name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Trigger Coolify Deployment
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"force": true}' \
          "http://cool.ahmadi98.ir/api/v1/services/deploy"
        env:
          COOLIFY_TOKEN: 2|Qrt3JGyGGXz8GNq3LH9pCgb3i1bKMuUWh2kmT4Vr24660458